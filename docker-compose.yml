services:
  postgres:
    image: postgres:16-alpine
    container_name: family_graph_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: family_graph
      POSTGRES_USER: family_graph
      POSTGRES_PASSWORD: family_graph
    ports:
      - "5432:5432"
    volumes:
      - family_graph_pgdata:/var/lib/postgresql/data

volumes:
  family_graph_pgdata:
